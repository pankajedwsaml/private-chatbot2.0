<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>privateai</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="chat-container">

    <!-- TOP BAR -->
    <div class="topbar">

        <!-- LEFT MENU -->
        <button class="menu-btn"
                onclick="toggleSidebar()">
            ☰
        </button>

        <!-- BRAND -->
        <div class="brand">
            privateai
        </div>

        <!-- NEW CHAT -->
        <button class="plus-btn"
                onclick="newChat()">
            +
        </button>

    </div>

    <!-- SIDEBAR -->
    <div class="sidebar"
         id="sidebar">

    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state"
         id="empty">

        <h2>
            Hi, how can I assist you today?
        </h2>

        <p>
            Ask anything — private, fast, simple.
        </p>

    </div>

    <!-- CHAT AREA -->
    <div class="chat-box"
         id="chat-box">

    </div>

    <!-- INPUT -->
    <div class="input-area">

        <input
            id="message-input"
            placeholder="Message privateai..."
        />

        <button
            onclick="sendMessage()">

            Send

        </button>

    </div>

</div>

<script src="/static/script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</body>
</html>
